<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Bioma Cerrado</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     COVER / START
════════════════════════════════════════════ -->
<section id="cover">
  <div id="cover-photo">
    <img
      src="https://images.unsplash.com/photo-1597305877032-0668b3c8fc8e?w=1200&q=85&fm=jpg&fit=crop"
      alt="Vegetação do Cerrado brasileiro"
      onerror="this.src='https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?w=1200&q=80'"
    >
  </div>

  <div id="cover-text">
    <p class="cover-label"><span></span>Biologia — Quiz temático</p>

    <h1>Bioma<br><em>Cerrado</em></h1>

    <p class="cover-desc">
      A maior savana da América do Sul e a mais biodiversa do planeta.
      Teste seus conhecimentos sobre esse patrimônio natural ameaçado.
    </p>

    <p class="level-label">Escolha o nível</p>

    <div class="level-group">
      <button class="level-btn" data-level="facil" onclick="selectLevel('facil', this)">
        <div class="lvl-dot"></div>
        <div>
          <div class="lvl-name">Fácil</div>
          <div class="lvl-meta">5 perguntas — conceitos gerais e características do bioma</div>
        </div>
      </button>

      <button class="level-btn" data-level="medio" onclick="selectLevel('medio', this)">
        <div class="lvl-dot"></div>
        <div>
          <div class="lvl-name">Médio</div>
          <div class="lvl-meta">5 perguntas — flora, fauna e dinâmica ambiental</div>
        </div>
      </button>

      <button class="level-btn" data-level="dificil" onclick="selectLevel('dificil', this)">
        <div class="lvl-dot"></div>
        <div>
          <div class="lvl-name">Difícil</div>
          <div class="lvl-meta">10 perguntas — ecologia avançada, conservação e impactos</div>
        </div>
      </button>
    </div>

    <button class="btn-start" id="start-btn" onclick="startQuiz()" disabled>
      Iniciar
    </button>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     QUIZ
════════════════════════════════════════════ -->
<section id="quiz-screen">
  <header class="quiz-header">
    <div class="quiz-header-left" id="quiz-level-name">Cerrado</div>

    <div class="quiz-header-center" id="prog-dots"></div>

    <div class="quiz-header-right">
      Pontuação:
      <strong id="score-val">0</strong>
    </div>
  </header>

  <div class="quiz-body">
    <div class="quiz-photo-col">
      <img id="quiz-photo" src="" alt="Cerrado">
    </div>

    <div class="quiz-content-col">
      <p class="q-index" id="q-index"></p>

      <p class="q-text" id="q-text"></p>

      <ul class="options-list" id="options-list"></ul>

      <div class="explanation" id="explanation">
        <div class="explanation-label">Explicação</div>
        <div id="explanation-body"></div>
      </div>

      <div class="quiz-nav">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">
          Continuar
        </button>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     RESULT
════════════════════════════════════════════ -->
<section id="result-screen">
  <div class="result-photo">
    <img
      src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0?w=1000&q=85&fm=jpg&fit=crop"
      alt="Cerrado ao entardecer"
      onerror="this.src='https://images.unsplash.com/photo-1597305877032-0668b3c8fc8e?w=900&q=80'"
    >

    <p class="result-photo-caption" id="result-caption"></p>
  </div>

  <div class="result-content">
    <p class="result-sup"><span></span>Resultado</p>

    <div class="result-score-line">
      <span class="result-score-big" id="res-score">0</span>
      <span class="result-score-denom" id="res-denom">/5</span>
    </div>

    <p class="result-pct" id="res-pct"></p>

    <div class="result-rule"></div>

    <h2 class="result-title" id="res-title"></h2>

    <p class="result-msg" id="res-msg"></p>

    <div class="result-actions">
      <button class="btn-action primary" onclick="restartSameLevel()">
        Repetir nível
      </button>

      <button class="btn-action secondary" onclick="goToStart()">
        Trocar nível
      </button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
